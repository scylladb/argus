# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: argus

# The changelog is generated by our custom script and passed via --release-notes.
# Disable GoReleaser's built-in changelog so it does not overwrite our notes.
changelog:
    disable: true

# Run from repo root, so tidy the module relative to the cli/ dir.
before:
    hooks:
        - sh -c "cd cli && go mod tidy"

builds:
    - id: argus
      # GoReleaser is invoked from the repo root; point it at the cli/ module.
      dir: cli
      main: .
      binary: argus
      # Inject version information at link time
      ldflags:
          - -s -w
          - -X main.version={{ .Version }}
          - -X main.commit={{ .Commit }}
          - -X main.date={{ .Date }}
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - windows
          - darwin
      goarch:
          - amd64
          - arm64
      # Remove the entry below if you want to ship Windows arm64 in the future.
      ignore:
          - goos: windows
            goarch: arm64

archives:
    - id: argus-archive
      name_template: >-
          argus_{{ .Version }}_
          {{- if eq .Os "darwin"}}macOS{{- else}}{{ .Os }}{{- end}}_
          {{- .Arch }}
      formats:
          - tar.gz
      # Windows users expect a zip archive
      format_overrides:
          - goos: windows
            formats:
                - zip
      files:
          - cli/LICENSE*
          - cli/README*

checksum:
    name_template: "argus_{{ .Version }}_checksums.txt"
    algorithm: sha256

release:
    draft: false
    prerelease: auto
    # When a draft release already exists for this tag, replace it.
    replace_existing_draft: true
    # Release notes are passed via --release-notes in the workflow.

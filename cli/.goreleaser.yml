# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
version: 2

project_name: argus

# The changelog is generated by our custom script and passed via --release-notes.
# Disable GoReleaser's built-in changelog so it does not overwrite our notes.
changelog:
    disable: true

# NOTE: `go mod tidy` was deliberately removed from before.hooks.
# Running it during release can silently modify go.sum, meaning the binary
# would not be built from the exact committed state.  Enforce tidy in CI
# checks or pre-tag scripts instead.
builds:
    - id: argus
      # GoReleaser is invoked from the repo root; point it at the cli/ module.
      dir: cli
      main: .
      binary: argus
      # Inject version information at link time
      ldflags:
          - -s -w
          - -X main.version={{ .Version }}
          - -X main.commit={{ .Commit }}
          - -X main.date={{ .Date }}
      env:
          - CGO_ENABLED=0
      goos:
          - linux
          - windows
          - darwin
      goarch:
          - amd64
          - arm64
      # Remove the entry below if you want to ship Windows arm64 in the future.
      ignore:
          - goos: windows
            goarch: arm64

archives:
    - id: argus-archive
      name_template: >-
          argus_{{ .Version }}_
          {{- if eq .Os "darwin"}}macOS{{- else}}{{ .Os }}{{- end}}_
          {{- .Arch }}
      formats:
          - tar.gz
      # Windows users expect a zip archive
      format_overrides:
          - goos: windows
            formats:
                - zip
      # LICENSE and README live at the repo root, not under cli/.
      # GoReleaser is invoked from the repo root so these paths resolve correctly.
      files:
          - src: "LICENSE*"
            dst: .
            strip_parent: true
          - src: "README*"
            dst: .
            strip_parent: true

checksum:
    name_template: "argus_{{ .Version }}_checksums.txt"
    algorithm: sha256

release:
    draft: false
    prerelease: auto
    # When a draft release already exists for this tag, replace it.
    replace_existing_draft: true
    # Release notes are passed via --release-notes in the workflow.

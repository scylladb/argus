name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  claude:
    if: |
      (
        github.event_name == 'issue_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
        (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER')
      ) || (
        github.event_name == 'pull_request_review_comment' &&
        contains(github.event.comment.body, '@claude') &&
        (github.event.comment.author_association == 'OWNER' || github.event.comment.author_association == 'MEMBER') &&
        (github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER')
      ) || (
        github.event_name == 'pull_request_review' &&
        contains(github.event.review.body, '@claude') &&
        (github.event.review.author_association == 'OWNER' || github.event.review.author_association == 'MEMBER') &&
        (github.event.pull_request.author_association == 'OWNER' || github.event.pull_request.author_association == 'MEMBER')
      ) || (
        github.event_name == 'issues' &&
        (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')) &&
        (github.event.issue.author_association == 'OWNER' || github.event.issue.author_association == 'MEMBER')
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      issues: read
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Resolve PR head ref
        id: get-ref
        run: |
          set -euo pipefail

          ref=""
          repo=""

          if [[ "${{ github.event_name }}" == "issue_comment" && -n "${{ github.event.issue.pull_request.url }}" ]]; then
            PR_JSON=$(gh api repos/${{ github.repository }}/pulls/${{ github.event.issue.number }})
            ref=$(echo "$PR_JSON" | jq -r '.head.sha // empty')
            repo=$(echo "$PR_JSON" | jq -r '.head.repo.full_name // empty')
          elif [[ "${{ github.event_name }}" == "pull_request_review_comment" || "${{ github.event_name }}" == "pull_request_review" ]]; then
            ref="${{ github.event.pull_request.head.sha }}"
            repo="${{ github.event.pull_request.head.repo.full_name }}"
          else
            ref="${{ github.sha }}"
            repo="${{ github.repository }}"
          fi

          if [[ -z "$ref" || "$ref" == "null" || -z "$repo" || "$repo" == "null" ]]; then
            echo "Error: failed to resolve ref/repo for event '${{ github.event_name }}'." >&2
            echo "ref='$ref', repo='$repo'" >&2
            exit 1
          fi

          {
            echo "ref=$ref"
            echo "repo=$repo"
          } >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          ref: ${{ steps.get-ref.outputs.ref }}
          repository: ${{ steps.get-ref.outputs.repo }}
          persist-credentials: false

      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}

          # This is an optional setting that allows Claude to read CI results on PRs
          additional_permissions: |
            actions: read

          # Optional: Give a custom prompt to Claude. If this is not specified, Claude will perform the instructions specified in the comment that tagged it.
          # prompt: 'Update the pull request description to include a summary of changes.'

          # Optional: Add claude_args to customize behavior and configuration
          # See https://github.com/anthropics/claude-code-action/blob/main/docs/usage.md
          # or https://code.claude.com/docs/en/cli-reference for available options
          # claude_args: '--allowed-tools Bash(gh pr:*)'
